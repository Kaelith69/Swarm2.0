<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540" role="img" aria-label="Swarm 2.0 capability matrix">
  <defs>
    <linearGradient id="cBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070B18"/>
      <stop offset="100%" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="cDone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064020"/><stop offset="100%" stop-color="#042A14"/>
    </linearGradient>
    <linearGradient id="cProg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A2000"/><stop offset="100%" stop-color="#1E1200"/>
    </linearGradient>
    <linearGradient id="cPlan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0C1A3A"/><stop offset="100%" stop-color="#061020"/>
    </linearGradient>
  </defs>

  <rect width="820" height="540" rx="12" fill="url(#cBg)"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">Swarm 2.0 — Capability Matrix</text>

  <!-- Column headers -->
  <text x="56" y="54" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">FEATURE</text>
  <text x="460" y="54" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">DETAILS</text>
  <text x="690" y="54" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">STATUS</text>

  <!-- Header divider -->
  <line x1="30" y1="58" x2="790" y2="58" stroke="#1E293B" stroke-width="1"/>

  <!-- ── ROW MACRO: y_top, icon, feature, detail, status_color, status_text ── -->

  <!-- Row 1: 4-Tier Routing (done) -->
  <rect x="30" y="62" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="81" font-family="'Segoe UI',Arial,sans-serif" font-size="16">🧠</text>
  <text x="78" y="80" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">4-Tier Routing Cascade</text>
  <text x="78" y="96" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">len check → keyword match → local Gemma classifier → cloud fallback; every path returns route + reason</text>
  <rect x="645" y="72" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="87" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 2: Local RAG (done) -->
  <rect x="30" y="112" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="131" font-family="'Segoe UI',Arial,sans-serif" font-size="16">📚</text>
  <text x="78" y="130" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Retrieval-Augmented Generation (RAG)</text>
  <text x="78" y="146" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">sentence-transformers + hnswlib HNSW index + SQLite; ingest .txt/.md/.pdf; injected into every prompt</text>
  <rect x="645" y="122" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="137" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 3: Conversation Memory (done) -->
  <rect x="30" y="162" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="181" font-family="'Segoe UI',Arial,sans-serif" font-size="16">💬</text>
  <text x="78" y="180" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Per-User Conversation Memory</text>
  <text x="78" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">SQLite per user_id; configurable depth (MEMORY_MAX_TURNS); persists across restarts; thread-safe</text>
  <rect x="645" y="172" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="187" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 4: Multi-Cloud (done) -->
  <rect x="30" y="212" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="231" font-family="'Segoe UI',Arial,sans-serif" font-size="16">☁️</text>
  <text x="78" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Multi-Cloud LLM Routing</text>
  <text x="78" y="246" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Groq (reasoning), Gemini Flash (long context), Kimi/Moonshot (planning); graceful fallback on error/no key</text>
  <rect x="645" y="222" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="237" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 5: Bot Adapters (done) -->
  <rect x="30" y="262" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="281" font-family="'Segoe UI',Arial,sans-serif" font-size="16">🤖</text>
  <text x="78" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Telegram + Discord Bot Adapters</text>
  <text x="78" y="296" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Polling mode (no public URL) + Webhook mode; Ed25519 Discord verify; Telegram secret token; NAT-friendly</text>
  <rect x="645" y="272" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="287" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 6: Personality System (done) -->
  <rect x="30" y="312" width="760" height="44" rx="6" fill="url(#cDone)" stroke="#10B981" stroke-width="1"/>
  <text x="52" y="331" font-family="'Segoe UI',Arial,sans-serif" font-size="16">🎭</text>
  <text x="78" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">YAML Personality System</text>
  <text x="78" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Name, style, humor, expertise via personality.yaml or env vars; injected into every local + cloud prompt</text>
  <rect x="645" y="322" width="130" height="22" rx="6" fill="#064020" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="337" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#34D399">✓ Implemented</text>

  <!-- Row 7: Streaming (in progress) -->
  <rect x="30" y="362" width="760" height="44" rx="6" fill="url(#cProg)" stroke="#F59E0B" stroke-width="1"/>
  <text x="52" y="381" font-family="'Segoe UI',Arial,sans-serif" font-size="16">⚡</text>
  <text x="78" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Streaming Responses (SSE)</text>
  <text x="78" y="396" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Server-sent events on /query; progressive bot messages; reduces perceived latency on local inference</text>
  <rect x="645" y="372" width="130" height="22" rx="6" fill="#3A2000" stroke="#F59E0B" stroke-width="1"/>
  <text x="710" y="387" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#FCD34D">⟳ In Progress</text>

  <!-- Row 8: Route Analytics (in progress) -->
  <rect x="30" y="412" width="760" height="44" rx="6" fill="url(#cProg)" stroke="#F59E0B" stroke-width="1"/>
  <text x="52" y="431" font-family="'Segoe UI',Arial,sans-serif" font-size="16">📊</text>
  <text x="78" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#E2E8F0">Route Analytics Dashboard</text>
  <text x="78" y="446" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">SQLite log of route/reason/latency; minimal web UI for health and query stats; planned for v2.1</text>
  <rect x="645" y="422" width="130" height="22" rx="6" fill="#3A2000" stroke="#F59E0B" stroke-width="1"/>
  <text x="710" y="437" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#FCD34D">⟳ In Progress</text>

  <!-- Row 9: Tool Use / Function Calling (planned) -->
  <rect x="30" y="462" width="760" height="44" rx="6" fill="url(#cPlan)" stroke="#475569" stroke-width="1"/>
  <text x="52" y="481" font-family="'Segoe UI',Arial,sans-serif" font-size="16">🔧</text>
  <text x="78" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Tool Use / Function Calling</text>
  <text x="78" y="496" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#475569">Allow LLM to invoke external tools (web search, calculator); long-term memory; multi-agent coordination</text>
  <rect x="645" y="472" width="130" height="22" rx="6" fill="#0C1A3A" stroke="#475569" stroke-width="1"/>
  <text x="710" y="487" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#64748B">◌ Planned</text>

  <!-- Legend -->
  <rect x="30" y="514" width="760" height="18" rx="5" fill="#0F172A" stroke="#1E293B" stroke-width="1" opacity="0.7"/>
  <rect x="48" y="521" width="10" height="6" rx="2" fill="#10B981"/>
  <text x="62" y="529" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Implemented — live in v2.0</text>
  <rect x="200" y="521" width="10" height="6" rx="2" fill="#F59E0B"/>
  <text x="214" y="529" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">In Progress — v2.1</text>
  <rect x="340" y="521" width="10" height="6" rx="2" fill="#475569"/>
  <text x="354" y="529" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Planned — v2.2+</text>
</svg>
