<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <defs>
    <linearGradient id="capBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0B1E"/>
      <stop offset="100%" style="stop-color:#12102A"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#5B21B6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="340" fill="url(#capBg)" rx="10"/>
  <rect x="0" y="0" width="700" height="3" fill="#7C3AED" rx="0"/>

  <!-- Title -->
  <text x="350" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        font-weight="700" text-anchor="middle" fill="#94A3B8" letter-spacing="3">CAPABILITY OVERVIEW</text>

  <!-- Y axis label area -->
  <!-- Bar chart: label on left, bar in middle, % on right -->
  <!-- Row heights: 48px each starting at y=55 -->

  <!-- ─── Row 1: Intelligent Routing ─── -->
  <text x="218" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#C4B5FD">4-Tier Smart Routing</text>
  <rect x="228" y="60" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="60" width="370" height="22" rx="4" fill="url(#bar1)"/>
  <text x="608" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#C4B5FD">95%</text>

  <!-- ─── Row 2: Local Privacy ─── -->
  <text x="218" y="113" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#C4B5FD">Local-First Privacy</text>
  <rect x="228" y="100" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="100" width="370" height="22" rx="4" fill="url(#bar1)"/>
  <text x="608" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#C4B5FD">95%</text>

  <!-- ─── Row 3: RAG Knowledge ─── -->
  <text x="218" y="153" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#93C5FD">RAG Knowledge Base</text>
  <rect x="228" y="140" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="140" width="351" height="22" rx="4" fill="url(#bar2)"/>
  <text x="608" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#93C5FD">90%</text>

  <!-- ─── Row 4: Cloud Integration ─── -->
  <text x="218" y="193" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#93C5FD">Cloud Integration</text>
  <rect x="228" y="180" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="180" width="351" height="22" rx="4" fill="url(#bar2)"/>
  <text x="608" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#93C5FD">90%</text>

  <!-- ─── Row 5: Multi-Platform ─── -->
  <text x="218" y="233" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#67E8F9">Multi-Platform Bots</text>
  <rect x="228" y="220" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="220" width="332" height="22" rx="4" fill="url(#bar3)"/>
  <text x="608" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#67E8F9">85%</text>

  <!-- ─── Row 6: Personality ─── -->
  <text x="218" y="273" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        text-anchor="end" fill="#67E8F9">Personality System</text>
  <rect x="228" y="260" width="390" height="22" rx="4" fill="#1E1040" opacity="0.8"/>
  <rect x="228" y="260" width="312" height="22" rx="4" fill="url(#bar3)"/>
  <text x="608" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="700" fill="#67E8F9">80%</text>

  <!-- Tick marks at 25%, 50%, 75%, 100% -->
  <line x1="325" y1="48" x2="325" y2="296" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.3"/>
  <line x1="423" y1="48" x2="423" y2="296" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.3"/>
  <line x1="521" y1="48" x2="521" y2="296" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.3"/>
  <line x1="618" y1="48" x2="618" y2="296" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.3"/>

  <text x="325" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#4B5563">25%</text>
  <text x="423" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#4B5563">50%</text>
  <text x="521" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#4B5563">75%</text>
  <text x="618" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#4B5563">100%</text>

  <!-- Subtitle -->
  <text x="350" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#4B5563" font-style="italic">
    Self-assessed scores · your mileage may vary
  </text>
</svg>
