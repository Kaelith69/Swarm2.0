<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" role="img" aria-label="Swarm 2.0 data flow pipeline diagram">
  <defs>
    <linearGradient id="dfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070B18"/>
      <stop offset="100%" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="dfInput" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2A5A"/><stop offset="100%" stop-color="#0C1640"/>
    </linearGradient>
    <linearGradient id="dfRag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#073844"/><stop offset="100%" stop-color="#041E28"/>
    </linearGradient>
    <linearGradient id="dfOrc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E1040"/><stop offset="100%" stop-color="#130A2C"/>
    </linearGradient>
    <linearGradient id="dfLocal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D1B69"/><stop offset="100%" stop-color="#1E1040"/>
    </linearGradient>
    <linearGradient id="dfCloud" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/><stop offset="100%" stop-color="#112050"/>
    </linearGradient>
    <linearGradient id="dfOut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#063A20"/><stop offset="100%" stop-color="#041C10"/>
    </linearGradient>
    <marker id="dfArrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <marker id="dfArrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <marker id="dfArrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="dfArrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="dfArrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect width="820" height="520" rx="12" fill="url(#dfBg)"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">Swarm 2.0 — Data Flow Pipeline</text>

  <!-- ──────────────────────── STEP 1: INPUT ──────────────────────── -->
  <rect x="30" y="50" width="160" height="70" rx="8" fill="url(#dfInput)" stroke="#2563EB" stroke-width="1.5"/>
  <text x="110" y="74" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#93C5FD">① User Input</text>
  <text x="110" y="90" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Telegram · Discord</text>
  <text x="110" y="104" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">POST /query · REST API</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="85" x2="228" y2="85" stroke="#2563EB" stroke-width="1.5" marker-end="url(#dfArrB)"/>

  <!-- ──────────────────────── STEP 2: VALIDATE ──────────────────────── -->
  <rect x="230" y="50" width="160" height="70" rx="8" fill="url(#dfInput)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="310" y="74" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#67E8F9">② Validate</text>
  <text x="310" y="90" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">Sanitise · truncate</text>
  <text x="310" y="104" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#64748B">MAX_INPUT_CHARS=8000</text>

  <!-- Arrow 2→3 -->
  <line x1="390" y1="85" x2="428" y2="85" stroke="#06B6D4" stroke-width="1.5" marker-end="url(#dfArrC)"/>

  <!-- ──────────────────────── STEP 3: PARALLEL CONTEXT ──────────────────────── -->
  <!-- Brace / split indicator -->
  <line x1="430" y1="85" x2="430" y2="55" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
  <line x1="430" y1="85" x2="430" y2="115" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>

  <rect x="432" y="44" width="180" height="50" rx="7" fill="url(#dfRag)" stroke="#06B6D4" stroke-width="1.3"/>
  <text x="522" y="62" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#67E8F9">③a RAG Retrieval</text>
  <text x="522" y="76" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">embed query → HNSW k-NN</text>
  <text x="522" y="88" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">→ fetch top-3 SQLite chunks</text>

  <rect x="432" y="102" width="180" height="50" rx="7" fill="url(#dfRag)" stroke="#10B981" stroke-width="1.3"/>
  <text x="522" y="120" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#6EE7B7">③b Memory Lookup</text>
  <text x="522" y="134" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">load last N turns for user_id</text>
  <text x="522" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">MEMORY_MAX_TURNS=10</text>

  <!-- Arrows 3a,3b → 4 -->
  <line x1="612" y1="69" x2="636" y2="69" stroke="#06B6D4" stroke-width="1.3" marker-end="url(#dfArrC)"/>
  <line x1="612" y1="127" x2="636" y2="127" stroke="#10B981" stroke-width="1.3" marker-end="url(#dfArrG)"/>
  <line x1="636" y1="69" x2="636" y2="95" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
  <line x1="636" y1="127" x2="636" y2="103" stroke="#10B981" stroke-width="1" opacity="0.5"/>

  <!-- ──────────────────────── STEP 4: ORCHESTRATOR ──────────────────────── -->
  <rect x="638" y="44" width="152" height="110" rx="8" fill="url(#dfOrc)" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="714" y="66" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#C4B5FD">④ Orchestrator</text>
  <text x="714" y="82" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8B7CC8">Tier 1: len check</text>
  <text x="714" y="95" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8B7CC8">Tier 2: keyword match</text>
  <text x="714" y="108" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8B7CC8">Tier 3: LLM classify</text>
  <text x="714" y="121" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8B7CC8">Tier 4: local fallback</text>
  <text x="714" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">route + reason decided</text>

  <!-- Arrow: orchestrator down to routing decision -->
  <line x1="714" y1="154" x2="714" y2="192" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#dfArrP)"/>

  <!-- ──────────────────────── STEP 5: ROUTING DECISION ──────────────────────── -->
  <!-- Diamond decision shape -->
  <polygon points="714,194 764,228 714,262 664,228" fill="#0F172A" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="714" y="222" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#C4B5FD">Route</text>
  <text x="714" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#C4B5FD">Select</text>

  <!-- Routing branches -->
  <!-- Local branch (left) -->
  <line x1="664" y1="228" x2="420" y2="228" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#dfArrP)"/>
  <text x="540" y="221" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8B7CC8">local / RAG</text>

  <!-- Cloud branch (below) -->
  <line x1="714" y1="262" x2="714" y2="296" stroke="#2563EB" stroke-width="1.3" marker-end="url(#dfArrB)"/>
  <text x="730" y="284" text-anchor="start" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#60A5FA">cloud</text>

  <!-- ──────────────────────── LOCAL INFERENCE ──────────────────────── -->
  <rect x="240" y="200" width="180" height="56" rx="8" fill="url(#dfLocal)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="330" y="220" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#C4B5FD">⑤a llama.cpp</text>
  <text x="330" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#A78BFA">Gemma 2 2B Q4_K_M</text>
  <text x="330" y="248" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">local_simple · local_rag · local_fallback</text>

  <!-- ──────────────────────── CLOUD INFERENCE ──────────────────────── -->
  <rect x="638" y="298" width="152" height="90" rx="8" fill="url(#dfCloud)" stroke="#2563EB" stroke-width="1.5"/>
  <text x="714" y="318" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#93C5FD">⑤b Cloud API</text>

  <!-- Groq -->
  <rect x="648" y="326" width="42" height="22" rx="4" fill="#1E2A5A" stroke="#2563EB" stroke-width="1"/>
  <text x="669" y="341" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#93C5FD">Groq</text>
  <!-- Gemini -->
  <rect x="697" y="326" width="42" height="22" rx="4" fill="#1E2A5A" stroke="#06B6D4" stroke-width="1"/>
  <text x="718" y="341" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#67E8F9">Gemini</text>
  <!-- Kimi -->
  <rect x="746" y="326" width="36" height="22" rx="4" fill="#1E2A5A" stroke="#A855F7" stroke-width="1"/>
  <text x="764" y="341" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#D8B4FE">Kimi</text>

  <text x="714" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">cloud_router.py · HTTPS</text>
  <text x="714" y="380" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">fallback → local on error</text>

  <!-- Arrow: cloud → merge -->
  <line x1="714" y1="388" x2="714" y2="418" stroke="#2563EB" stroke-width="1.3"/>
  <line x1="714" y1="418" x2="540" y2="418" stroke="#2563EB" stroke-width="1.3" marker-end="url(#dfArrB)"/>

  <!-- Arrow: local → merge -->
  <line x1="330" y1="256" x2="330" y2="418" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#dfArrP)"/>

  <!-- ──────────────────────── STEP 6: MEMORY WRITE ──────────────────────── -->
  <rect x="360" y="398" width="178" height="40" rx="8" fill="url(#dfRag)" stroke="#10B981" stroke-width="1.5"/>
  <text x="449" y="416" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#6EE7B7">⑥ Save to Memory</text>
  <text x="449" y="430" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#475569">user + assistant turn → SQLite</text>

  <!-- Arrow: memory write → response -->
  <line x1="449" y1="438" x2="449" y2="462" stroke="#10B981" stroke-width="1.3" marker-end="url(#dfArrG)"/>

  <!-- ──────────────────────── STEP 7: RESPONSE ──────────────────────── -->
  <rect x="280" y="464" width="338" height="42" rx="8" fill="url(#dfOut)" stroke="#10B981" stroke-width="1.5"/>
  <text x="449" y="482" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#6EE7B7">⑦ Response Delivered</text>
  <text x="449" y="497" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#475569">{ response · route · reason }  →  Telegram / Discord / JSON</text>

  <!-- Stage labels on left -->
  <text x="18" y="89" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle" transform="rotate(-90 18 89)">INPUT</text>
  <text x="18" y="228" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle" transform="rotate(-90 18 228)">ROUTING</text>
  <text x="18" y="370" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle" transform="rotate(-90 18 370)">INFERENCE</text>
  <text x="18" y="485" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#334155" text-anchor="middle" transform="rotate(-90 18 485)">OUTPUT</text>
</svg>
