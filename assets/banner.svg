<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0A1E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A0B3E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#06B6D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Grid dots (decorative) -->
  <g fill="#7C3AED" opacity="0.15">
    <circle cx="30" cy="30" r="2"/><circle cx="70" cy="30" r="2"/>
    <circle cx="110" cy="30" r="2"/><circle cx="150" cy="30" r="2"/>
    <circle cx="30" cy="70" r="2"/><circle cx="70" cy="70" r="2"/>
    <circle cx="110" cy="70" r="2"/><circle cx="150" cy="70" r="2"/>
    <circle cx="30" cy="110" r="2"/><circle cx="70" cy="110" r="2"/>
    <circle cx="750" cy="100" r="2"/><circle cx="790" cy="100" r="2"/>
    <circle cx="830" cy="100" r="2"/><circle cx="870" cy="100" r="2"/>
    <circle cx="750" cy="140" r="2"/><circle cx="790" cy="140" r="2"/>
    <circle cx="830" cy="140" r="2"/><circle cx="870" cy="140" r="2"/>
    <circle cx="750" cy="170" r="2"/><circle cx="790" cy="170" r="2"/>
    <circle cx="830" cy="170" r="2"/><circle cx="870" cy="170" r="2"/>
  </g>

  <!-- Left neural nodes -->
  <circle cx="60" cy="150" r="6" fill="#7C3AED" opacity="0.7"/>
  <circle cx="100" cy="125" r="5" fill="#2563EB" opacity="0.7"/>
  <circle cx="140" cy="155" r="7" fill="#7C3AED" opacity="0.5"/>
  <circle cx="80" cy="175" r="4" fill="#06B6D4" opacity="0.6"/>
  <line x1="60" y1="150" x2="100" y2="125" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="125" x2="140" y2="155" stroke="#2563EB" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="150" x2="80" y2="175" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="175" x2="140" y2="155" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>

  <!-- Right neural nodes -->
  <circle cx="780" cy="40" r="6" fill="#06B6D4" opacity="0.7"/>
  <circle cx="820" cy="65" r="5" fill="#7C3AED" opacity="0.7"/>
  <circle cx="855" cy="38" r="7" fill="#2563EB" opacity="0.5"/>
  <circle cx="840" cy="80" r="4" fill="#06B6D4" opacity="0.6"/>
  <line x1="780" y1="40" x2="820" y2="65" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>
  <line x1="820" y1="65" x2="855" y2="38" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
  <line x1="820" y1="65" x2="840" y2="80" stroke="#2563EB" stroke-width="1" opacity="0.3"/>

  <!-- Accent border top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#titleGrad)" rx="0"/>

  <!-- Main title -->
  <text x="450" y="95"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" text-anchor="middle"
        fill="url(#titleGrad)">SWARM 2.0</text>

  <!-- Subtitle -->
  <text x="450" y="133"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" text-anchor="middle"
        fill="#94A3B8" letter-spacing="5">HYBRID AGENTIC ASSISTANT</text>

  <!-- Divider line -->
  <line x1="200" y1="148" x2="700" y2="148" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="450" y="172"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" text-anchor="middle"
        fill="#6366F1" opacity="0.9" font-style="italic">
    local brains · cloud horsepower · raspberry pi certified · personality included
  </text>
</svg>
