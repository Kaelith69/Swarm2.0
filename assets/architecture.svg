<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600" role="img" aria-label="Swarm 2.0 system architecture diagram">
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070B18"/>
      <stop offset="100%" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="aClientBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E2A5A"/><stop offset="100%" stop-color="#111B3A"/>
    </linearGradient>
    <linearGradient id="aApiBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1040"/><stop offset="100%" stop-color="#110B30"/>
    </linearGradient>
    <linearGradient id="aOrcBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1040"/><stop offset="100%" stop-color="#150A30"/>
    </linearGradient>
    <linearGradient id="aSuppBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#082030"/><stop offset="100%" stop-color="#041520"/>
    </linearGradient>
    <linearGradient id="aLocalBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D1B69"/><stop offset="100%" stop-color="#1E1040"/>
    </linearGradient>
    <linearGradient id="aCloudBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/><stop offset="100%" stop-color="#112050"/>
    </linearGradient>
    <linearGradient id="aStorBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E3A4A"/><stop offset="100%" stop-color="#072030"/>
    </linearGradient>
    <marker id="aArrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <marker id="aArrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <marker id="aArrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="aArrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="820" height="600" rx="12" fill="url(#aBg)"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E2E8F0">Swarm 2.0 — System Architecture</text>

  <!-- ═══════════════ LAYER LABELS ═══════════════ -->
  <text x="18" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">CLIENTS</text>
  <text x="18" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">API LAYER</text>
  <text x="18" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">ORCHESTRATION</text>
  <text x="18" y="388" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">SUPPORT MODULES</text>
  <text x="18" y="488" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="#475569" letter-spacing="1">STORAGE / INFERENCE</text>

  <!-- ═══════════════ CLIENTS ROW ═══════════════ -->
  <!-- Telegram -->
  <rect x="100" y="74" width="140" height="52" rx="8" fill="url(#aClientBox)" stroke="#2563EB" stroke-width="1.5"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#93C5FD">Telegram</text>
  <text x="170" y="112" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#64748B">Polling / Webhook</text>
  <!-- Discord -->
  <rect x="268" y="74" width="140" height="52" rx="8" fill="url(#aClientBox)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="338" y="96" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#C4B5FD">Discord</text>
  <text x="338" y="112" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#64748B">Gateway / Webhook</text>
  <!-- REST Client -->
  <rect x="436" y="74" width="140" height="52" rx="8" fill="url(#aClientBox)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="506" y="96" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#67E8F9">REST Client</text>
  <text x="506" y="112" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#64748B">curl / HTTP / Bot</text>

  <!-- Arrows: Clients → API -->
  <line x1="170" y1="126" x2="170" y2="168" stroke="#2563EB" stroke-width="1.5" marker-end="url(#aArrB)"/>
  <line x1="338" y1="126" x2="338" y2="168" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#aArrP)"/>
  <line x1="506" y1="126" x2="506" y2="168" stroke="#06B6D4" stroke-width="1.5" marker-end="url(#aArrC)"/>

  <!-- ═══════════════ API LAYER ═══════════════ -->
  <rect x="100" y="170" width="580" height="80" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
  <text x="390" y="192" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">FastAPI Application — api.py</text>
  <!-- Endpoint pills -->
  <rect x="116" y="200" width="112" height="24" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="172" y="216" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">POST /query</text>
  <rect x="238" y="200" width="112" height="24" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="294" y="216" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">GET /health</text>
  <rect x="360" y="200" width="148" height="24" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="434" y="216" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">POST /webhook/telegram</text>
  <rect x="518" y="200" width="146" height="24" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="591" y="216" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">POST /webhook/discord</text>

  <!-- Arrow: API → Orchestrator -->
  <line x1="390" y1="250" x2="390" y2="286" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#aArrP)"/>

  <!-- ═══════════════ ORCHESTRATOR ═══════════════ -->
  <rect x="100" y="288" width="580" height="82" rx="8" fill="#0F172A" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="390" y="310" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#C4B5FD">AgentOrchestrator — orchestrator.py</text>
  <text x="390" y="327" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#64748B">Tier 1: len ≤ 150  →  Tier 2: keyword match  →  Tier 3: local Gemma classifier  →  Tier 4: fallback</text>
  <text x="390" y="342" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#64748B">Injects: RAG context + conversation history + personality system prompt → every inference call</text>
  <text x="390" y="358" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#475569">Returns RouteResult { route · reason · response }</text>

  <!-- Arrows: Orchestrator → Support Modules -->
  <line x1="180" y1="370" x2="145" y2="400" stroke="#06B6D4" stroke-width="1.3" marker-end="url(#aArrC)"/>
  <line x1="265" y1="370" x2="265" y2="400" stroke="#06B6D4" stroke-width="1.3" marker-end="url(#aArrC)"/>
  <line x1="350" y1="370" x2="390" y2="400" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#aArrP)"/>
  <line x1="500" y1="370" x2="520" y2="400" stroke="#2563EB" stroke-width="1.3" marker-end="url(#aArrB)"/>
  <line x1="575" y1="370" x2="630" y2="400" stroke="#10B981" stroke-width="1.3" marker-end="url(#aArrG)"/>

  <!-- ═══════════════ SUPPORT MODULES ═══════════════ -->
  <!-- RAG Store -->
  <rect x="100" y="400" width="110" height="52" rx="6" fill="url(#aSuppBox)" stroke="#06B6D4" stroke-width="1.2"/>
  <text x="155" y="421" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#67E8F9">RAG Store</text>
  <text x="155" y="435" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#22D3EE">rag/store.py</text>
  <text x="155" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">HNSW + SQLite</text>
  <!-- Memory -->
  <rect x="222" y="400" width="110" height="52" rx="6" fill="url(#aSuppBox)" stroke="#06B6D4" stroke-width="1.2"/>
  <text x="277" y="421" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#67E8F9">Memory</text>
  <text x="277" y="435" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#22D3EE">memory.py</text>
  <text x="277" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">per-user SQLite</text>
  <!-- Personality -->
  <rect x="344" y="400" width="110" height="52" rx="6" fill="url(#aLocalBox)" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="399" y="421" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#C4B5FD">Personality</text>
  <text x="399" y="435" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#A78BFA">personality.py</text>
  <text x="399" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">YAML / env vars</text>
  <!-- Config -->
  <rect x="466" y="400" width="110" height="52" rx="6" fill="url(#aClientBox)" stroke="#2563EB" stroke-width="1.2"/>
  <text x="521" y="421" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#93C5FD">Config</text>
  <text x="521" y="435" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#60A5FA">config.py</text>
  <text x="521" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">dotenv Settings</text>
  <!-- Messaging -->
  <rect x="588" y="400" width="110" height="52" rx="6" fill="url(#aLocalBox)" stroke="#10B981" stroke-width="1.2"/>
  <text x="643" y="421" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#6EE7B7">Messaging</text>
  <text x="643" y="435" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#34D399">parsers/senders</text>
  <text x="643" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">bot I/O</text>

  <!-- Arrows: Support → Storage/Inference -->
  <line x1="155" y1="452" x2="155" y2="494" stroke="#06B6D4" stroke-width="1.3" marker-end="url(#aArrC)"/>
  <line x1="277" y1="452" x2="240" y2="494" stroke="#06B6D4" stroke-width="1.3" marker-end="url(#aArrC)"/>
  <line x1="399" y1="452" x2="399" y2="494" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#aArrP)"/>
  <line x1="521" y1="452" x2="580" y2="494" stroke="#2563EB" stroke-width="1.3" marker-end="url(#aArrB)"/>

  <!-- ═══════════════ STORAGE / INFERENCE ═══════════════ -->
  <!-- SQLite + HNSW -->
  <rect x="100" y="496" width="175" height="70" rx="8" fill="url(#aSuppBox)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="188" y="518" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#67E8F9">SQLite + HNSW</text>
  <text x="188" y="534" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#22D3EE">RAG vectors + metadata</text>
  <text x="188" y="548" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#22D3EE">Conversation memory</text>
  <text x="188" y="561" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">hnswlib · sqlite3</text>
  <!-- llama.cpp -->
  <rect x="295" y="496" width="175" height="70" rx="8" fill="url(#aLocalBox)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="383" y="518" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#C4B5FD">llama.cpp</text>
  <text x="383" y="534" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#A78BFA">Gemma 2 2B Q4_K_M</text>
  <text x="383" y="548" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#A78BFA">llama_cpp_runner.py</text>
  <text x="383" y="561" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">subprocess · classify/generate</text>
  <!-- Cloud Providers -->
  <rect x="490" y="496" width="218" height="70" rx="8" fill="url(#aCloudBox)" stroke="#2563EB" stroke-width="1.5"/>
  <text x="599" y="518" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#93C5FD">Cloud Providers</text>
  <text x="599" y="534" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#60A5FA">Groq (reasoning) · Gemini (long ctx)</text>
  <text x="599" y="548" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#60A5FA">Kimi / Moonshot (planning)</text>
  <text x="599" y="561" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">cloud_router.py · HTTPS</text>

  <!-- Legend -->
  <rect x="100" y="578" width="580" height="14" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1" opacity="0.7"/>
  <circle cx="120" cy="585" r="3" fill="#2563EB"/>
  <text x="128" y="589" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Client Layer</text>
  <circle cx="190" cy="585" r="3" fill="#7C3AED"/>
  <text x="198" y="589" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Orchestration / Personality</text>
  <circle cx="300" cy="585" r="3" fill="#06B6D4"/>
  <text x="308" y="589" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">RAG / Memory / Storage</text>
  <circle cx="410" cy="585" r="3" fill="#10B981"/>
  <text x="418" y="589" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Messaging I/O</text>
  <circle cx="490" cy="585" r="3" fill="#2563EB" opacity="0.7"/>
  <line x1="498" y1="585" x2="510" y2="585" stroke="#2563EB" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  <text x="515" y="589" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#475569">Cloud Route</text>
</svg>
