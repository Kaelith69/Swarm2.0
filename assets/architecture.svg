<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0B1E"/>
      <stop offset="100%" style="stop-color:#12102A"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06B6D4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="540" fill="url(#archBg)" rx="10"/>
  <rect x="0" y="0" width="820" height="3" fill="#7C3AED" rx="0"/>

  <!-- Title -->
  <text x="410" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="700" text-anchor="middle" fill="#94A3B8" letter-spacing="3">SYSTEM ARCHITECTURE</text>

  <!-- ── Row 1: User Input ── -->
  <rect x="310" y="48" width="200" height="44" rx="8" fill="#1E1040" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="410" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600"
        text-anchor="middle" fill="#C4B5FD">👤 User Message</text>
  <text x="410" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#6B7280">text / command</text>

  <!-- Arrow 1→2 -->
  <line x1="410" y1="92" x2="410" y2="120" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 2: Bot Layer ── -->
  <rect x="60" y="124" width="175" height="44" rx="8" fill="#0D1B3E" stroke="#2563EB" stroke-width="1.5"/>
  <text x="147" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
        text-anchor="middle" fill="#93C5FD">📨 Telegram Bot</text>
  <text x="147" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#4B82B8">polling / webhook</text>

  <rect x="323" y="124" width="175" height="44" rx="8" fill="#0D1B3E" stroke="#2563EB" stroke-width="1.5"/>
  <text x="410" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
        text-anchor="middle" fill="#93C5FD">🎮 Discord Bot</text>
  <text x="410" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#4B82B8">gateway / webhook</text>

  <rect x="585" y="124" width="175" height="44" rx="8" fill="#0D1B3E" stroke="#2563EB" stroke-width="1.5"/>
  <text x="672" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
        text-anchor="middle" fill="#93C5FD">🔌 REST API</text>
  <text x="672" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#4B82B8">POST /query</text>

  <!-- Fan from user to bots -->
  <line x1="380" y1="92" x2="147" y2="124" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="410" y1="92" x2="410" y2="124" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="440" y1="92" x2="672" y2="124" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Fan converge to FastAPI -->
  <line x1="147" y1="168" x2="310" y2="208" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="168" x2="410" y2="208" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="672" y1="168" x2="510" y2="208" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 3: FastAPI ── -->
  <rect x="200" y="208" width="420" height="44" rx="8" fill="#0F2040" stroke="#2563EB" stroke-width="2"/>
  <text x="410" y="228" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#BFDBFE">⚡ FastAPI Server</text>
  <text x="410" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#4B82B8">port 8000 · single worker · /health /query /webhook/*</text>

  <!-- Arrow to Orchestrator -->
  <line x1="410" y1="252" x2="410" y2="280" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ── Row 4: Orchestrator + side storage ── -->
  <rect x="220" y="280" width="380" height="54" rx="8" fill="#1E1040" stroke="#7C3AED" stroke-width="2"/>
  <text x="410" y="302" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#C4B5FD">🧠 AgentOrchestrator</text>
  <text x="410" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#7C6AB8">4-tier routing · keyword fast-path · LLM classifier</text>

  <!-- RAG Store (left side) -->
  <rect x="48" y="286" width="148" height="42" rx="8" fill="#0A1F2E" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="122" y="306" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600"
        text-anchor="middle" fill="#67E8F9">📚 RAG Store</text>
  <text x="122" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#0E7490">hnswlib · SQLite · MiniLM</text>
  <line x1="196" y1="307" x2="220" y2="307" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Conv Memory (right side) -->
  <rect x="624" y="286" width="148" height="42" rx="8" fill="#0A1F2E" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="698" y="306" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600"
        text-anchor="middle" fill="#67E8F9">💬 Conv Memory</text>
  <text x="698" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#0E7490">SQLite · per user_id</text>
  <line x1="600" y1="307" x2="624" y2="307" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrow to backends -->
  <line x1="410" y1="334" x2="410" y2="362" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ── Row 5: Backends ── -->
  <!-- Local Gemma -->
  <rect x="30" y="366" width="165" height="50" rx="8" fill="#1A0B2E" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="112" y="387" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700"
        text-anchor="middle" fill="#C4B5FD">🦙 Local Gemma</text>
  <text x="112" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#7C5AB8">llama.cpp · Q4_K_M</text>
  <text x="112" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#4B3570">short / RAG / fallback</text>

  <!-- Groq -->
  <rect x="220" y="366" width="135" height="50" rx="8" fill="#0A1929" stroke="#2563EB" stroke-width="1.5"/>
  <text x="287" y="387" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700"
        text-anchor="middle" fill="#93C5FD">⚡ Groq</text>
  <text x="287" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#3B82B8">LLaMA 3.1 8B</text>
  <text x="287" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#1E4570">reasoning</text>

  <!-- Gemini -->
  <rect x="375" y="366" width="135" height="50" rx="8" fill="#0A1929" stroke="#2563EB" stroke-width="1.5"/>
  <text x="442" y="387" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700"
        text-anchor="middle" fill="#93C5FD">🌟 Gemini</text>
  <text x="442" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#3B82B8">1.5 Flash</text>
  <text x="442" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#1E4570">long context</text>

  <!-- Kimi -->
  <rect x="530" y="366" width="135" height="50" rx="8" fill="#0A1929" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="597" y="387" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700"
        text-anchor="middle" fill="#67E8F9">🌙 Kimi</text>
  <text x="597" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#0E7490">Moonshot v1-8k</text>
  <text x="597" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#065470">planning</text>

  <!-- Fan from orchestrator to backends -->
  <line x1="360" y1="362" x2="200" y2="366" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="390" y1="362" x2="350" y2="366" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="362" x2="445" y2="366" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="460" y1="362" x2="545" y2="366" stroke="#06B6D4" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

  <!-- ── Row 6: Response ── -->
  <rect x="280" y="448" width="260" height="40" rx="8" fill="#0D1B3E" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="410" y="466" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
        text-anchor="middle" fill="#67E8F9">✅ Response + route + reason</text>
  <text x="410" y="482" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#0E7490">memory updated · delivered to user</text>

  <!-- Converge to response -->
  <line x1="112" y1="416" x2="310" y2="448" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="287" y1="416" x2="370" y2="448" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="442" y1="416" x2="430" y2="448" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="597" y1="416" x2="490" y2="448" stroke="#06B6D4" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Legend -->
  <rect x="30" y="500" width="760" height="30" rx="6" fill="#0D0B1E" stroke="#1E1040" stroke-width="1"/>
  <circle cx="55" cy="515" r="5" fill="#7C3AED"/>
  <text x="65" y="519" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94A3B8">Local / LLM</text>
  <circle cx="145" cy="515" r="5" fill="#2563EB"/>
  <text x="155" y="519" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94A3B8">Transport / Cloud</text>
  <circle cx="265" cy="515" r="5" fill="#06B6D4"/>
  <text x="275" y="519" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94A3B8">Storage / Kimi</text>
  <text x="450" y="519" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4B5563" text-anchor="middle">Single-worker only · SQLite is not safe across processes</text>
</svg>
