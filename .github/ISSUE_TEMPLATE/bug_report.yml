name: "🐛 Bug report"
description: Report a reproducible problem in Swarm 2.0
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please be specific and include enough detail to reproduce the issue.

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Raspberry Pi / Windows / Linux / other
      placeholder: Raspberry Pi 5 (Bookworm)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: python3 --version output
    validations:
      required: true

  - type: textarea
    id: env-settings
    attributes:
      label: Relevant .env settings (redact secrets)
      description: Include key names and non-sensitive toggles only.
      placeholder: |
        BOT_MODE=polling
        USE_LLM_ROUTING=true
        ENABLE_MEMORY=true
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback / logs
      render: shell
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with ...
        2. Send message ...
        3. Observe ...
    validations:
      required: true
